<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="أهدافي">
<title>نظام الأهداف اليومية</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0e;
    --card: #111820;
    --border: #1e2a38;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --green: #00e676;
    --red: #ff1744;
    --amber: #ffab00;
    --text: #e8edf5;
    --muted: #4a5568;
    --font-ar: 'IBM Plex Sans Arabic', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background:var(--bg); color:var(--text); font-family:var(--font-ar);
    min-height:100vh; overflow-x:hidden;
    padding-bottom:max(24px, env(safe-area-inset-bottom));
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image: linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);
    background-size:40px 40px; pointer-events:none; z-index:0;
  }
  .container { max-width:760px; margin:0 auto; padding:20px 16px 32px; position:relative; z-index:1; }

/* Header */
.header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:22px; gap:12px; }
.header-left h1 { font-size:20px; font-weight:700; letter-spacing:-0.5px; }
.header-left .subtitle { font-size:10px; color:var(–muted); font-family:var(–font-mono); margin-top:3px; }
.date-badge { background:var(–card); border:1px solid var(–border); border-radius:8px; padding:7px 12px; font-family:var(–font-mono); font-size:10px; color:var(–accent); white-space:nowrap; }

/* Score */
.score-bar { background:var(–card); border:1px solid var(–border); border-radius:12px; padding:18px 20px; margin-bottom:18px; display:flex; align-items:center; gap:18px; }
.score-circle { width:68px; height:68px; flex-shrink:0; position:relative; }
.score-circle svg { transform:rotate(-90deg); width:68px; height:68px; }
.bg-circle { fill:none; stroke:var(–border); stroke-width:5; }
.prog-circle { fill:none; stroke:var(–accent); stroke-width:5; stroke-linecap:round; stroke-dasharray:188; stroke-dashoffset:188; transition:stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1); }
.score-num { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(–font-mono); font-size:15px; font-weight:700; color:var(–accent); }
.score-info { flex:1; }
.score-info .label { font-size:10px; color:var(–muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
.stats { display:flex; gap:18px; flex-wrap:wrap; }
.stat-item .val { font-family:var(–font-mono); font-size:20px; font-weight:700; line-height:1; }
.stat-item .val.green { color:var(–green); }
.stat-item .val.amber { color:var(–amber); }
.stat-item .key { font-size:9px; color:var(–muted); margin-top:2px; }
.prog-track { height:3px; background:var(–border); border-radius:2px; margin-top:10px; overflow:hidden; }
.prog-fill { height:100%; background:linear-gradient(90deg,var(–accent2),var(–accent)); border-radius:2px; transition:width 0.6s ease; }

/* Add form */
.add-form { background:var(–card); border:1px solid var(–border); border-radius:12px; padding:14px; margin-bottom:18px; display:flex; gap:8px; flex-wrap:wrap; }
.add-form input { flex:1; min-width:130px; background:var(–bg); border:1px solid var(–border); border-radius:8px; color:var(–text); font-family:var(–font-ar); font-size:14px; padding:10px 12px; outline:none; transition:border-color 0.2s; }
.add-form input:focus { border-color:var(–accent); }
.add-form input::placeholder { color:var(–muted); }
.cat-select { background:var(–bg); border:1px solid var(–border); border-radius:8px; color:var(–text); font-family:var(–font-ar); font-size:13px; padding:10px; outline:none; cursor:pointer; }
.btn-add { background:var(–accent); color:var(–bg); border:none; border-radius:8px; padding:10px 18px; font-family:var(–font-ar); font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; }
.btn-add:active { opacity:0.75; }

/* Filters */
.filters { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
.filter-btn { background:var(–card); border:1px solid var(–border); border-radius:20px; color:var(–muted); font-family:var(–font-ar); font-size:11px; padding:5px 12px; cursor:pointer; transition:all 0.2s; }
.filter-btn.active { border-color:var(–accent); color:var(–accent); background:rgba(0,212,255,0.08); }

/* Goals */
.goals-list { display:flex; flex-direction:column; gap:7px; }
.goal-card { background:var(–card); border:1px solid var(–border); border-radius:10px; padding:13px 14px; display:flex; align-items:center; gap:12px; transition:opacity 0.3s; animation:slideIn 0.25s ease; }
@keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.goal-card.done { opacity:0.4; }
.goal-card.done .goal-text { text-decoration:line-through; color:var(–muted); }
.goal-check { width:24px; height:24px; flex-shrink:0; border:2px solid var(–border); border-radius:7px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
.goal-check.checked { background:var(–green); border-color:var(–green); }
.check-icon { display:none; width:13px; height:13px; }
.goal-check.checked .check-icon { display:block; }
.goal-content { flex:1; min-width:0; }
.goal-text { font-size:14px; font-weight:500; }
.goal-meta { display:flex; align-items:center; gap:6px; margin-top:4px; }
.cat-tag { font-size:10px; padding:2px 8px; border-radius:10px; font-weight:600; }
.btn-del { background:none; border:none; color:var(–muted); cursor:pointer; font-size:20px; padding:2px 6px; line-height:1; }
.btn-del:active { color:var(–red); }
.empty { text-align:center; padding:40px 24px; color:var(–muted); font-size:13px; border:1px dashed var(–border); border-radius:12px; }

/* Streak */
.streak-section { margin-top:22px; background:var(–card); border:1px solid var(–border); border-radius:12px; padding:14px 18px; }
.streak-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.streak-header h3 { font-size:11px; color:var(–muted); text-transform:uppercase; letter-spacing:1px; }
.streak-num { font-family:var(–font-mono); font-size:12px; color:var(–amber); }
.week-dots { display:flex; gap:5px; }
.day-dot { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; }
.dot { width:100%; height:32px; border-radius:7px; border:1px solid var(–border); display:flex; align-items:center; justify-content:center; font-size:11px; color:var(–muted); }
.dot.complete { background:rgba(0,230,118,0.12); border-color:var(–green); color:var(–green); }
.dot.partial { background:rgba(255,171,0,0.12); border-color:var(–amber); color:var(–amber); }
.dot.today { border-color:var(–accent); color:var(–accent); }
.day-label { font-size:9px; color:var(–muted); }

.reset-btn { display:block; width:100%; margin-top:14px; background:none; border:1px solid var(–border); border-radius:8px; color:var(–muted); font-family:var(–font-ar); font-size:12px; padding:10px; cursor:pointer; }
.reset-btn:active { border-color:var(–red); color:var(–red); }
.section-label { font-size:10px; color:var(–muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
</style>

</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>نظام الأهداف اليومية</h1>
      <div class="subtitle">DAILY EXECUTION SYSTEM</div>
    </div>
    <div class="date-badge" id="dateBadge">--</div>
  </div>

  <div class="score-bar">
    <div class="score-circle">
      <svg viewBox="0 0 68 68">
        <circle class="bg-circle" cx="34" cy="34" r="30"/>
        <circle class="prog-circle" id="progCircle" cx="34" cy="34" r="30"/>
      </svg>
      <div class="score-num" id="scoreNum">0%</div>
    </div>
    <div class="score-info">
      <div class="label">الإنجاز اليومي</div>
      <div class="stats">
        <div class="stat-item"><div class="val green" id="doneCount">0</div><div class="key">مكتمل</div></div>
        <div class="stat-item"><div class="val amber" id="remCount">0</div><div class="key">متبقي</div></div>
        <div class="stat-item"><div class="val" id="totCount">0</div><div class="key">إجمالي</div></div>
      </div>
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="add-form">
    <input type="text" id="goalInput" placeholder="أضف هدفاً جديداً..." maxlength="80">
    <select class="cat-select" id="catSelect">
      <option value="عام">عام</option>
      <option value="صحة">صحة</option>
      <option value="مال">مال</option>
      <option value="تعلم">تعلم</option>
      <option value="إنتاج">إنتاج</option>
      <option value="عقل">عقل</option>
    </select>
    <button class="btn-add" onclick="addGoal()">+ إضافة</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('الكل',this)">الكل</button>
    <button class="filter-btn" onclick="setFilter('صحة',this)">صحة</button>
    <button class="filter-btn" onclick="setFilter('مال',this)">مال</button>
    <button class="filter-btn" onclick="setFilter('تعلم',this)">تعلم</button>
    <button class="filter-btn" onclick="setFilter('إنتاج',this)">إنتاج</button>
    <button class="filter-btn" onclick="setFilter('عقل',this)">عقل</button>
  </div>

  <div class="section-label">قائمة الأهداف</div>
  <div class="goals-list" id="goalsList"></div>

  <div class="streak-section">
    <div class="streak-header">
      <h3>سجل الأسبوع</h3>
      <div class="streak-num" id="streakNum">🔥 0 يوم</div>
    </div>
    <div class="week-dots" id="weekDots"></div>
  </div>

<button class="reset-btn" onclick="resetDay()">↺ تصفير ليوم جديد</button>

</div>

<script>
const CATS={
  'عام':{color:'#4a5568',bg:'rgba(74,85,104,0.2)'},
  'صحة':{color:'#00e676',bg:'rgba(0,230,118,0.1)'},
  'مال':{color:'#ffab00',bg:'rgba(255,171,0,0.1)'},
  'تعلم':{color:'#00d4ff',bg:'rgba(0,212,255,0.1)'},
  'إنتاج':{color:'#7c3aed',bg:'rgba(124,58,237,0.1)'},
  'عقل':{color:'#ff6b6b',bg:'rgba(255,107,107,0.1)'},
};
let goals=[],history=[],activeFilter='الكل';
const KEY='goal_tracker_v2';
function save(){localStorage.setItem(KEY,JSON.stringify({goals,history}));}
function load(){try{const d=JSON.parse(localStorage.getItem(KEY)||'{}');goals=d.goals||[];history=d.history||[];}catch{goals=[];history=[];}}
function today(){return new Date().toISOString().slice(0,10);}
function addGoal(){
  const inp=document.getElementById('goalInput');
  const text=inp.value.trim();
  if(!text)return;
  goals.push({id:Date.now(),text,cat:document.getElementById('catSelect').value,done:false});
  inp.value='';save();render();
}
document.getElementById('goalInput').addEventListener('keydown',e=>{if(e.key==='Enter')addGoal();});
function toggleGoal(id){const g=goals.find(x=>x.id===id);if(g){g.done=!g.done;save();render();}}
function deleteGoal(id){goals=goals.filter(x=>x.id!==id);save();render();}
function setFilter(f,btn){activeFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function resetDay(){
  if(!confirm('تصفير وبدء يوم جديد؟'))return;
  if(goals.length)history.push({date:today(),total:goals.length,done:goals.filter(g=>g.done).length});
  if(history.length>30)history.shift();
  goals=[];save();render();
}
function updateScore(){
  const t=goals.length,d=goals.filter(g=>g.done).length;
  const pct=t?Math.round((d/t)*100):0;
  document.getElementById('scoreNum').textContent=pct+'%';
  document.getElementById('doneCount').textContent=d;
  document.getElementById('remCount').textContent=t-d;
  document.getElementById('totCount').textContent=t;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progCircle').style.strokeDashoffset=188-(pct/100)*188;
}
function renderWeek(){
  const days=['أح','إث','ث','أر','خ','ج','س'];
  const now=new Date();
  let html='';
  for(let i=6;i>=0;i--){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const key=d.toISOString().slice(0,10);
    const isToday=i===0;
    const hist=history.find(h=>h.date===key);
    let cls=isToday?'today':'',label=isToday?'●':'○';
    if(hist){const p=hist.total?hist.done/hist.total:0;if(p>=0.8){cls='complete';label='✓';}else if(p>=0.4){cls='partial';label='~';}else{cls='';label='○';}}
    html+=`<div class="day-dot"><div class="dot ${cls}">${label}</div><div class="day-label">${days[d.getDay()]}</div></div>`;
  }
  document.getElementById('weekDots').innerHTML=html;
  let streak=0;const check=new Date(now);
  for(let i=0;i<30;i++){
    const k=check.toISOString().slice(0,10);
    const h=history.find(x=>x.date===k);
    if(h&&h.total&&h.done/h.total>=0.8){streak++;check.setDate(check.getDate()-1);}else break;
  }
  document.getElementById('streakNum').textContent=`🔥 ${streak} يوم`;
}
function render(){
  document.getElementById('dateBadge').textContent=new Date().toLocaleDateString('ar-AE',{weekday:'short',month:'short',day:'numeric'});
  const filtered=activeFilter==='الكل'?goals:goals.filter(g=>g.cat===activeFilter);
  const list=document.getElementById('goalsList');
  if(!filtered.length){list.innerHTML='<div class="empty">لا توجد أهداف — أضف هدفك الأول</div>';}
  else{
    list.innerHTML=filtered.map(g=>{
      const cat=CATS[g.cat]||CATS['عام'];
      return `<div class="goal-card ${g.done?'done':''}">
        <div class="goal-check ${g.done?'checked':''}" onclick="toggleGoal(${g.id})">
          <svg class="check-icon" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3.5 3.5 5.5-6" stroke="#080a0e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="goal-content">
          <div class="goal-text">${g.text}</div>
          <div class="goal-meta"><span class="cat-tag" style="color:${cat.color};background:${cat.bg}">${g.cat}</span></div>
        </div>
        <button class="btn-del" onclick="deleteGoal(${g.id})">×</button>
      </div>`;
    }).join('');
  }
  updateScore();renderWeek();
}
load();render();
</script>

</body>
</html>
